; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
description = "ESP32-S3 环境监测器 (FreeRTOS 重构版)"
src_dir = src
data_dir = data

[env:esp32-s3-devkitm-1]
; -- 平台与硬件配置 --
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino

; -- 串口监视器配置 --
monitor_speed = 115200

; -- 构建与编译选项 --
build_flags = 
    -DCORE_DEBUG_LEVEL=5 ; 设置调试输出等级 (5=Verbose, 4=Debug, 3=Info, 2=Warning, 1=Error)
    -DARDUINO_USB_CDC_ON_BOOT=1 ; 在S3上启用USB CDC作为默认串口，以确保监视器正常工作

; -- 文件系统配置 --
board_build.filesystem = spiffs
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

; -- 库依赖项 (Dependencies) --
lib_deps = 
    ; JSON 序列化/反序列化库 (已升级至最新版本)
    bblanchon/ArduinoJson @ ^7.0.4

    ; 板载 RGB LED (WS2812) 控制库
    adafruit/Adafruit NeoPixel @ ^1.12.0

    ; 异步 Web 服务器 (用于 HTTP 和 Captive Portal)
    esphome/ESPAsyncWebServer-esphome @ ^3.1.0

    ; WebSocket 服务器 (用于与前端实时通信)
    links2004/WebSockets @ ^2.4.1

    ; DHT11 温湿度传感器库
    adafruit/DHT sensor library @ ^1.4.6
    
    ; MQTT 客户端库 (用于连接 OneNET 云平台)
    knolleary/PubSubClient @ ^2.8

; !! 重要说明 !!
; Grove 多通道气体传感器 V2 库
; 请将您原始项目中的 "Multichannel_Gas_GMXXX" 库文件夹手动放置到本项目的 `lib` 目录下。
; PlatformIO 会自动检测并编译它，无需在此处声明。

